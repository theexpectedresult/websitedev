<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; font-family: var(--font-sans); background: var(--bg-page); color: var(--text-body); }
  .wrap { padding: var(--space-5); display: flex; flex-direction: column; gap: var(--space-5); }
  .row { display: flex; align-items: center; gap: var(--space-3); flex-wrap: wrap; }
  .grp { display: flex; gap: var(--space-5); align-items: flex-start; flex-wrap: wrap; }
  .lab { font-size: 10px; font-family: var(--font-mono); color: var(--text-muted); text-transform: uppercase; letter-spacing: var(--tracking-wide); width: 100%; }
</style>
</head>
<body>
  <div id="root" class="wrap"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="../../_ds_bundle.js"></script>
  <script type="text/babel">
    const { Button, Input, Switch } = window.ERTechServicesDesignSystem_dceeff;
    function Demo() {
      const [on, setOn] = React.useState(true);
      return (
        <>
          <div className="grp">
            <span className="lab">Variants</span>
            <Button variant="primary">Primary</Button>
            <Button variant="secondary">Secondary</Button>
            <Button variant="outline">Outline</Button>
            <Button variant="ghost">Ghost</Button>
            <Button variant="danger">Danger</Button>
            <Button variant="primary" disabled>Disabled</Button>
          </div>
          <div className="grp">
            <span className="lab">Sizes</span>
            <Button size="sm">Small</Button>
            <Button size="md">Medium</Button>
            <Button size="lg">Large</Button>
          </div>
          <div className="grp" style={{ alignItems: "flex-end" }}>
            <span className="lab">Inputs</span>
            <Input label="Work email" type="email" placeholder="you@company.com" hint="We reply within one business day" style={{ width: "240px" }} />
            <Input label="Site address" error="Required for a quote" style={{ width: "240px" }} />
            <Switch checked={on} onChange={setOn} label="Arm at night" />
          </div>
        </>
      );
    }
    ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
  </script>
</body>
</html>
