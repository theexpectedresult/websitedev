<!-- @dsCard group="Spacing" viewport="700x160" name="Spacing Scale" subtitle="4px base · 4→96px" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; font-family: var(--font-sans); background: var(--bg-page); }
  .wrap { padding: var(--space-5); display: flex; align-items: flex-end; gap: var(--space-4); flex-wrap: wrap; }
  .s { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .bar { background: var(--brand-cyan); border-radius: var(--radius-sm); width: 28px; }
  .lab { font-family: var(--font-mono); font-size: 10px; color: var(--text-muted); }
</style>
</head>
<body>
  <div class="wrap">
    <div class="s"><div class="bar" style="height:var(--space-1)"></div><span class="lab">1·4</span></div>
    <div class="s"><div class="bar" style="height:var(--space-2)"></div><span class="lab">2·8</span></div>
    <div class="s"><div class="bar" style="height:var(--space-3)"></div><span class="lab">3·12</span></div>
    <div class="s"><div class="bar" style="height:var(--space-4)"></div><span class="lab">4·16</span></div>
    <div class="s"><div class="bar" style="height:var(--space-5)"></div><span class="lab">5·24</span></div>
    <div class="s"><div class="bar" style="height:var(--space-6)"></div><span class="lab">6·32</span></div>
    <div class="s"><div class="bar" style="height:var(--space-7)"></div><span class="lab">7·48</span></div>
    <div class="s"><div class="bar" style="height:var(--space-8)"></div><span class="lab">8·64</span></div>
  </div>
</body>
</html>
