<!-- @dsCard group="Colors" viewport="700x150" name="Gradients" subtitle="Pillar caps, intro banner, header, footer, section rule" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; font-family: var(--font-body); background: var(--paper); }
  .wrap { padding: var(--space-5); display: flex; flex-direction: column; gap: var(--space-3); }
  .caps { display: grid; grid-template-columns: repeat(6,1fr); gap: var(--space-2); }
  .cap { height: 34px; border-radius: var(--radius-sm); }
  .rows { display: flex; gap: var(--space-3); }
  .g { flex: 1; border-radius: var(--radius-sm); height: 40px; display: flex; align-items: center; padding: 0 12px; color: #fff; font-size: 11px; font-weight: 600; }
  .rule { height: 4px; border-radius: 999px; background: var(--grad-rule); }
</style>
</head>
<body>
  <div class="wrap">
    <div class="caps">
      <div class="cap" style="background:var(--cap-sec)"></div>
      <div class="cap" style="background:var(--cap-vid)"></div>
      <div class="cap" style="background:var(--cap-acc)"></div>
      <div class="cap" style="background:var(--cap-net)"></div>
      <div class="cap" style="background:var(--cap-rec)"></div>
      <div class="cap" style="background:var(--cap-av)"></div>
    </div>
    <div class="rows">
      <div class="g" style="background:var(--grad-header-left)">Header</div>
      <div class="g" style="background:var(--grad-intro)">Intro banner</div>
      <div class="g" style="background:var(--grad-footer)">Footer</div>
    </div>
    <div class="rule"></div>
  </div>
</body>
</html>
