<!-- @dsCard group="Spacing" viewport="700x150" name="Corner Radii" subtitle="6 / 8 / 12 / 16 / pill" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; font-family: var(--font-sans); background: var(--bg-page); }
  .row { display: flex; gap: var(--space-5); padding: var(--space-5); align-items: flex-end; }
  .s { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .box { width: 72px; height: 56px; background: var(--cyan-50); border: 1.5px solid var(--brand-cyan); }
  .lab { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); }
  .pill { width: 96px; }
</style>
</head>
<body>
  <div class="row">
    <div class="s"><div class="box" style="border-radius:var(--radius-sm)"></div><span class="lab">sm · 6</span></div>
    <div class="s"><div class="box" style="border-radius:var(--radius-md)"></div><span class="lab">md · 8</span></div>
    <div class="s"><div class="box" style="border-radius:var(--radius-lg)"></div><span class="lab">lg · 12</span></div>
    <div class="s"><div class="box" style="border-radius:var(--radius-xl)"></div><span class="lab">xl · 16</span></div>
    <div class="s"><div class="box pill" style="border-radius:var(--radius-pill)"></div><span class="lab">pill · 999</span></div>
  </div>
</body>
</html>
