<!-- @dsCard group="Type" viewport="700x150" name="Monospace / Data" subtitle="JetBrains Mono for codes, specs, IDs" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; font-family: var(--font-sans); background: var(--bg-page); }
  .wrap { padding: var(--space-5); display: grid; gap: var(--space-3); }
  .mono { font-family: var(--font-mono); color: var(--text-strong); }
  .big { font-size: var(--fs-xl); font-weight: var(--fw-medium); }
  .row { display: flex; gap: var(--space-4); flex-wrap: wrap; }
  .pair { font-family: var(--font-mono); font-size: var(--fs-sm); color: var(--text-body); background: var(--gray-50); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 4px 10px; }
  .lab { font-family: var(--font-mono); font-size: 10px; color: var(--text-muted); }
</style>
</head>
<body>
  <div class="wrap">
    <div class="big mono">LIC-00214786 · #B7128</div>
    <div class="row">
      <span class="pair">Avigilon · H5A</span>
      <span class="pair">Control4 · EA-5</span>
      <span class="pair">DSC · PowerSeries</span>
      <span class="pair">Araknis · AN-310</span>
    </div>
    <span class="lab">JetBrains Mono — part numbers, licences, IP addresses, spec tables</span>
  </div>
</body>
</html>
