<!-- @dsCard group="Colors" viewport="700x150" name="Brand Core (canonical)" subtitle="Teal brand, ink, paper — from the pamphlets" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; font-family: var(--font-body); background: var(--paper); }
  .row { display: flex; gap: var(--space-3); padding: var(--space-5); }
  .sw { flex: 1; border-radius: var(--radius-md); overflow: hidden; border: 1px solid var(--line); }
  .chip { height: 84px; }
  .meta { padding: var(--space-3); }
  .name { font-size: var(--fs-sm); font-weight: 600; color: var(--ink); }
  .hex { font-family: var(--font-mono); font-size: var(--fs-xs); color: var(--text-muted); margin-top: 2px; }
  .role { font-size: var(--fs-xs); color: var(--text-muted); margin-top: 2px; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--brand)"></div><div class="meta"><div class="name">Brand teal</div><div class="hex">#39C6C0</div><div class="role">"Tech", links, highlights</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--brand-deep)"></div><div class="meta"><div class="name">Brand deep</div><div class="hex">#1F6D6A</div><div class="role">Links / text on white</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--ink)"></div><div class="meta"><div class="name">Ink</div><div class="hex">#1A2230</div><div class="role">Headings & body</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--paper);box-shadow:inset 0 0 0 1px var(--line)"></div><div class="meta"><div class="name">Paper</div><div class="hex">#FFFFFF</div><div class="role">Surfaces</div></div></div>
  </div>
</body>
</html>
