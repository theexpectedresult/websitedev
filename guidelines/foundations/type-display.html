<!-- @dsCard group="Type" viewport="700x230" name="Display Headings" subtitle="Barlow Semi Condensed bold, ink" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; font-family: var(--font-sans); background: var(--bg-page); }
  .wrap { padding: var(--space-5); display: grid; gap: var(--space-4); }
  .line { display: flex; align-items: baseline; gap: var(--space-4); }
  .tag { font-family: var(--font-mono); font-size: 10px; color: var(--text-muted); width: 120px; flex: none; }
  h1 { font: var(--text-h1); letter-spacing: var(--tracking-tight); color: var(--text-strong); margin: 0; }
  h2 { font: var(--text-h2); color: var(--text-strong); margin: 0; }
  h3 { font: var(--text-h3); color: var(--text-strong); margin: 0; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="line"><span class="tag">H1 · 49 / bold</span><h1>Secure by design</h1></div>
    <div class="line"><span class="tag">H2 · 31 / bold</span><h2>Access control, done right</h2></div>
    <div class="line"><span class="tag">H3 · 20 / semibold</span><h3>Control4 &amp; Crestron integration</h3></div>
  </div>
</body>
</html>
