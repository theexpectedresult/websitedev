<!-- @dsCard group="Spacing" viewport="700x170" name="Elevation / Shadows" subtitle="Subtle navy-tinted xs→lg + focus ring" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; font-family: var(--font-sans); background: var(--bg-subtle); }
  .row { display: flex; gap: var(--space-6); padding: var(--space-6); align-items: center; }
  .s { display: flex; flex-direction: column; align-items: center; gap: 12px; }
  .box { width: 84px; height: 56px; background: var(--white); border-radius: var(--radius-md); }
  .lab { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); }
</style>
</head>
<body>
  <div class="row">
    <div class="s"><div class="box" style="box-shadow:var(--shadow-xs)"></div><span class="lab">xs</span></div>
    <div class="s"><div class="box" style="box-shadow:var(--shadow-sm)"></div><span class="lab">sm</span></div>
    <div class="s"><div class="box" style="box-shadow:var(--shadow-md)"></div><span class="lab">md</span></div>
    <div class="s"><div class="box" style="box-shadow:var(--shadow-lg)"></div><span class="lab">lg</span></div>
    <div class="s"><div class="box" style="box-shadow:var(--shadow-focus)"></div><span class="lab">focus</span></div>
  </div>
</body>
</html>
