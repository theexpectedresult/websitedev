<!-- @dsCard group="Brand" viewport="700x220" name="Logos" subtitle="Commercial & residential lockups" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; font-family: var(--font-sans); background: var(--bg-page); }
  .row { display: flex; gap: var(--space-5); padding: var(--space-5); }
  .cell { flex: 1; border: 1px solid var(--border); border-radius: var(--radius-lg); padding: var(--space-5); display: flex; flex-direction: column; align-items: center; gap: var(--space-3); background: var(--white); }
  .cell img { height: 92px; object-fit: contain; }
  .name { font-size: var(--fs-xs); font-weight: var(--fw-semibold); color: var(--text-strong); }
  .sub { font-size: 11px; color: var(--text-muted); }
</style>
</head>
<body>
  <div class="row">
    <div class="cell">
      <img src="../../assets/logos/ertech-logo-tech-services.svg" alt="ER Tech Services" />
      <div class="name">ER Tech Services</div>
      <div class="sub">Commercial — primary lockup</div>
    </div>
    <div class="cell">
      <img src="../../assets/logos/ertech-logo-expected-result.svg" alt="The Expected Result" />
      <div class="name">The Expected Result</div>
      <div class="sub">Residential sub-brand</div>
    </div>
  </div>
</body>
</html>
